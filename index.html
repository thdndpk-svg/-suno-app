<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Music Auto Studio v24 Optimized</title>
  <style>
    :root{
      --bg1:#f8f5ff;
      --bg2:#eef5ff;
      --text:#4a4f68;
      --title:#5a5fcf;
      --green:#35a853;
      --red:#d84b5b;
      --shadow:0 10px 30px rgba(114, 132, 181, 0.12);
      --line:#e7ebf5;
      --soft:#edf5ff;
      --card:#ffffffcc;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #ffe8f4 0%, transparent 32%),
        radial-gradient(circle at top right, #f9dff2 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
      padding:18px;
    }

    .app{
      max-width:1450px;
      margin:0 auto;
    }

    .hero{
      background:rgba(255,255,255,0.68);
      border:1px solid rgba(255,255,255,0.85);
      backdrop-filter:blur(10px);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:20px;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      gap:16px;
      align-items:flex-start;
    }

    .brand-icon{
      width:62px;
      height:62px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#ffd5eb,#dff3ff);
      font-size:30px;
      box-shadow:var(--shadow);
      flex-shrink:0;
    }

    h1{
      margin:0;
      color:var(--title);
      font-size:28px;
      line-height:1.2;
    }

    .subtitle{
      margin-top:8px;
      font-size:14px;
      color:#6d728a;
    }

    .hero-right{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:10px;
      min-width:340px;
    }

    .flow-badge{
      background:linear-gradient(90deg,#ffe6f1,#f7dff8);
      color:#8a6b8d;
      padding:10px 16px;
      border-radius:999px;
      font-size:13px;
      white-space:nowrap;
      box-shadow:var(--shadow);
    }

    .ai-top-row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      width:100%;
    }

    .ai-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:12px 16px;
      border-radius:16px;
      background:#fffefb;
      border:1px solid #edf0f8;
      box-shadow:var(--shadow);
      font-weight:700;
      min-width:170px;
      justify-content:center;
    }

    .ai-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:#b8bcc8;
      box-shadow:0 0 0 4px rgba(184,188,200,0.15);
    }

    .ai-badge.online{ color:var(--green); }
    .ai-badge.online .ai-dot{
      background:var(--green);
      box-shadow:0 0 0 4px rgba(53,168,83,0.12);
    }

    .ai-badge.offline{ color:var(--red); }
    .ai-badge.offline .ai-dot{
      background:var(--red);
      box-shadow:0 0 0 4px rgba(216,75,91,0.12);
    }

    .compact-status{
      width:100%;
      max-width:420px;
      background:#f9fbff;
      border:1px solid #ebeff8;
      color:#67708c;
      border-radius:14px;
      padding:10px 12px;
      font-size:13px;
      text-align:right;
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .tabs{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .mini-btn,.tab-btn,.action-btn,.soft-btn,.danger-btn,.primary-btn,.tiny-btn{
      border:none;
      cursor:pointer;
      transition:.18s ease;
      font-weight:700;
      border-radius:14px;
    }

    .mini-btn:hover,.tab-btn:hover,.action-btn:hover,.soft-btn:hover,.danger-btn:hover,.primary-btn:hover,.tiny-btn:hover{
      transform:translateY(-1px);
    }

    .tab-btn{
      padding:14px 18px;
      background:#fff;
      border:1px solid #eef1f7;
      color:#6b7090;
      box-shadow:var(--shadow);
      font-size:15px;
    }

    .tab-btn.active{
      background:linear-gradient(135deg,#f6b2e1,#c899ff);
      color:#fff;
    }

    .tab-btn.blog{
      background:linear-gradient(135deg,#e8f3ff,#dff8f4);
      color:#4670c7;
    }

    .blog-panel{
      margin-top:14px;
      display:none;
      background:rgba(255,255,255,0.82);
      border:1px solid #edf0f7;
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .blog-panel.show{ display:block; }

    .panel-title{
      font-size:18px;
      font-weight:800;
      color:#5570c5;
    }

    .panel-desc{
      margin-top:6px;
      font-size:14px;
      color:#6c728b;
    }

    .blog-actions{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .action-btn{
      padding:12px 16px;
      background:#eef4ff;
      color:#4d63b7;
      border:1px solid #dfe8fb;
    }

    .action-btn.primary{
      background:linear-gradient(135deg,#86c5ff,#79dfd1);
      color:#fff;
    }

    .page-grid{
      margin-top:18px;
      display:grid;
      grid-template-columns:1.35fr 1fr;
      gap:18px;
      align-items:start;
    }

    .card{
      background:rgba(255,255,255,0.8);
      border:1px solid rgba(255,255,255,0.9);
      backdrop-filter:blur(8px);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .card h2{
      margin:0 0 16px;
      color:#5a5f84;
      font-size:20px;
    }

    .right-tools{
      margin-bottom:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-start;
    }

    .mini-btn{
      padding:12px 14px;
      background:#fff;
      color:#5f6580;
      border:1px solid #edf0f7;
      box-shadow:var(--shadow);
      font-size:14px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      font-weight:700;
      color:#666c88;
    }

    textarea,input,select{
      width:100%;
      border:1px solid #e4e8f2;
      border-radius:16px;
      background:#fff;
      color:#535975;
      padding:14px 14px;
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
      line-height:1.55;
    }

    .prompt-box{
      margin-bottom:10px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .triple{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
    }

    .toolbar{
      margin:12px 0 14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .soft-btn{
      padding:12px 16px;
      background:#edf5ff;
      color:#4b69c6;
      border:1px solid #dfeafc;
    }

    .primary-btn{
      padding:12px 18px;
      background:linear-gradient(135deg,#7bc3ff,#7be0c9);
      color:#fff;
      border:1px solid transparent;
      box-shadow:var(--shadow);
    }

    .danger-btn{
      padding:12px 16px;
      background:#fff1f4;
      color:#cb5164;
      border:1px solid #ffd9e0;
    }

    .chip-status{
      display:inline-flex;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      background:#f8fbff;
      border:1px solid #e6ecf7;
      color:#69718d;
      font-size:14px;
      min-height:42px;
      white-space:nowrap;
    }

    .section-box{
      margin-top:14px;
      padding:14px;
      border:1px solid #ebeff6;
      border-radius:20px;
      background:rgba(250,252,255,0.88);
    }

    .section-title{
      font-size:17px;
      font-weight:800;
      color:#6980c1;
      margin-bottom:12px;
    }

    .progress-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .progress-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid #edf1f8;
      border-radius:18px;
      padding:14px;
    }

    .progress-name{
      font-size:15px;
      color:#59607d;
      font-weight:700;
    }

    .badge-wait{
      background:#f8fbff;
      border:1px solid #e8edf7;
      color:#7d88a3;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      white-space:nowrap;
      flex-shrink:0;
    }

    .meter-label{
      margin:14px 0 6px;
      font-size:14px;
      font-weight:700;
      color:#67708c;
    }

    .meter{
      width:100%;
      height:12px;
      border-radius:999px;
      background:#eff3fa;
      overflow:hidden;
      border:1px solid #e7ebf5;
    }

    .meter-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#79c2ff,#f3a7d8,#7fe2cb);
      transition:width .3s ease;
    }

    .checklist{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .checklist label{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:600;
      color:#5e6684;
      line-height:1.25;
      margin:0;
    }

    .checklist input[type="checkbox"]{
      width:18px;
      height:18px;
      margin:0;
      flex:0 0 18px;
      accent-color:#7bc3ff;
    }

    .log-box{
      margin-top:12px;
      min-height:120px;
      background:#fff;
      border:1px solid #edf1f8;
      border-radius:18px;
      padding:12px;
      font-size:14px;
      color:#6b7391;
      line-height:1.6;
      white-space:pre-line;
      overflow:auto;
    }

    .song-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }

    .song-item{
      display:grid;
      grid-template-columns:32px 1fr auto;
      align-items:center;
      gap:12px;
      background:#fff;
      border:1px solid #edf1f8;
      border-radius:18px;
      padding:12px 14px;
    }

    .song-main{
      min-width:0;
    }

    .song-title{
      font-weight:800;
      color:#555d82;
      font-size:15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .song-meta{
      font-size:13px;
      color:#838aa3;
      margin-top:4px;
    }

    .song-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .tiny-btn{
      padding:8px 12px;
      background:#eef4ff;
      color:#5b6fbb;
    }

    .tiny-btn.delete{
      background:#fff1f4;
      color:#ca5767;
    }

    .empty-box{
      border:1px dashed #dfe5f0;
      border-radius:18px;
      padding:18px;
      text-align:center;
      color:#8a91aa;
      background:#fcfdff;
    }

    .mobile-only{ display:none; }

    @media (max-width: 1100px){
      .page-grid{
        grid-template-columns:1fr;
      }

      .hero-top{
        flex-direction:column;
      }

      .hero-right{
        align-items:flex-start;
        min-width:100%;
      }

      .ai-top-row{
        justify-content:flex-start;
      }

      .compact-status{
        justify-content:flex-start;
        text-align:left;
        max-width:none;
      }
    }

    @media (max-width: 760px){
      body{
        padding:10px;
      }

      .app{
        max-width:100%;
      }

      .hero{
        padding:14px;
        border-radius:22px;
      }

      .card{
        padding:14px;
        border-radius:22px;
      }

      h1{
        font-size:23px;
      }

      .subtitle{
        font-size:13px;
      }

      .tabs{
        gap:8px;
      }

      .tab-btn{
        padding:12px 14px;
        font-size:14px;
      }

      .row,.triple{
        grid-template-columns:1fr;
      }

      textarea,input,select{
        font-size:16px;
        padding:14px;
      }

      textarea{
        min-height:96px;
      }

      .toolbar{
        gap:8px;
      }

      .toolbar .chip-status{
        width:100%;
        justify-content:center;
      }

      .soft-btn,.primary-btn,.danger-btn,.mini-btn,.action-btn{
        font-size:15px;
        padding:13px 15px;
      }

      .right-tools{
        display:grid;
        grid-template-columns:1fr;
        gap:8px;
      }

      .right-tools .mini-btn{
        width:100%;
      }

      .progress-item{
        padding:12px;
        align-items:flex-start;
        flex-direction:column;
      }

      .badge-wait{
        align-self:flex-end;
      }

      .song-item{
        grid-template-columns:28px 1fr;
      }

      .song-right{
        grid-column:1 / -1;
        justify-content:flex-start;
      }

      .flow-badge
