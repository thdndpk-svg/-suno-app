<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Music Auto Studio v28</title>
  <style>
    :root{
      --bg1:#f7f8ff;
      --bg2:#eef4ff;
      --card:#ffffff;
      --text:#344054;
      --sub:#667085;
      --line:#dbe3f0;
      --pri:#5b6cff;
      --pri2:#7c4dff;
      --ok:#17b26a;
      --warn:#f79009;
      --bad:#f04438;
      --soft:#eef2ff;
      --shadow:0 12px 30px rgba(52,64,84,.10);
      --radius:20px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,77,255,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(91,108,255,.10), transparent 26%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .wrap{max-width:1540px;margin:0 auto;padding:16px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      margin-bottom:16px;
    }
    .brand h1{margin:0;font-size:30px;font-weight:900;letter-spacing:-.5px}
    .brand p{margin:5px 0 0;color:var(--sub);font-size:14px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      background:#fff;border:1px solid var(--line);border-radius:999px;
      padding:10px 14px;box-shadow:var(--shadow);font-weight:800;font-size:14px;
    }
    .dot{width:10px;height:10px;border-radius:50%;background:#c5cad3}
    .dot.ok{background:var(--ok)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--bad)}

    .layout{
      display:grid;
      grid-template-columns: 380px 1fr 380px;
      gap:16px;
      align-items:start;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    .card h2{
      margin:0 0 12px;
      font-size:18px;font-weight:900;
    }
    .card h3{
      margin:16px 0 10px;
      font-size:15px;font-weight:900;
    }
    .field{margin-bottom:10px}
    .label{
      display:block;margin-bottom:6px;
      font-size:13px;color:var(--sub);font-weight:800;
    }
    input[type="text"], input[type="number"], textarea, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
      font-size:14px;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    textarea{
      resize:vertical;min-height:92px;line-height:1.55;
    }
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

    .btns{display:flex;flex-wrap:wrap;gap:8px}
    .action-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .tool-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .song-action-grid{
      display:grid;
      grid-template-columns:repeat(5, minmax(90px, 1fr));
      gap:8px;
      width:100%;
    }

    button{
      border:none;border-radius:14px;padding:11px 14px;
      font-size:14px;font-weight:900;cursor:pointer;transition:.18s ease;
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    button:hover{transform:translateY(-1px)}
    .pri{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
    .soft{background:#eef2ff;color:#334155;border:1px solid #d9e2ff}
    .ok{background:linear-gradient(135deg,#17b26a,#12a150);color:#fff}
    .warn{background:linear-gradient(135deg,#ff9d2f,#f79009);color:#fff}
    .bad{background:linear-gradient(135deg,#f04438,#d92d20);color:#fff}
    .ghost{background:#f8fafc;color:#344054;border:1px solid var(--line)}
    .tiny{font-size:12px;color:var(--sub);line-height:1.55}

    .chips{
      display:flex;flex-wrap:wrap;gap:8px;
    }
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--line);
      background:#f8fbff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;font-weight:700;
      cursor:pointer;
      user-select:none;
    }
    .chip input{display:none}
    .chip.active{
      background:#eef2ff;
      border-color:#b7c7ff;
      color:#3346b0;
    }

    .status-list{display:grid;gap:10px}
    .status-item{
      border:1px solid var(--line);border-radius:14px;padding:12px;
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      background:#fbfcff;
    }
    .status-item b{font-size:14px}
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900;
      background:#eef2f6;color:#425466;
    }
    .badge.ok{background:#e9fff3;color:#067647}
    .badge.warn{background:#fff3df;color:#b54708}
    .badge.bad{background:#ffe9e7;color:#b42318}

    .quick{
      border:1px dashed #c7d2fe;border-radius:16px;padding:14px;background:#f8faff;
    }
    .preview{
      margin-top:10px;
      background:#fff;border:1px solid var(--line);border-radius:14px;
      padding:12px;min-height:150px;max-height:260px;overflow:auto;
      white-space:pre-wrap;line-height:1.55;font-size:14px;
    }

    .song-list{display:grid;gap:12px}
    .song{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
    }
    .song-head{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(420px, 540px);
      gap:12px;
      align-items:start;
      padding:14px;
      background:linear-gradient(180deg,#f9fbff,#f3f6ff);
      border-bottom:1px solid var(--line);
    }
    .song-title{font-size:19px;font-weight:900;margin-bottom:6px}
    .meta{display:flex;flex-wrap:wrap;gap:6px}
    .tag{
      display:inline-flex;align-items:center;
      padding:6px 10px;border-radius:999px;
      background:#eef2ff;color:#3949ab;font-size:12px;font-weight:900;
    }
    .song-body{padding:14px;display:grid;gap:12px}
    .box{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }
    .box b{display:block;margin-bottom:8px}
    .lyrics{white-space:pre-wrap;line-height:1.62;font-size:14px}

    .sticky{position:sticky;top:12px}

    @media (max-width: 1320px){
      .song-head{
        grid-template-columns:1fr;
      }
      .song-action-grid{
        grid-template-columns:repeat(3, minmax(100px, 1fr));
      }
    }
    @media (max-width: 1180px){
      .layout{grid-template-columns:1fr}
      .sticky{position:static}
    }
    @media (max-width: 760px){
      .brand h1{font-size:24px}
      .row,.row3,.row4,.action-grid,.tool-grid{grid-template-columns:1fr}
      .song-action-grid{grid-template-columns:1fr 1fr}
      button{width:100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>🎵 AI Music Auto Studio</h1
