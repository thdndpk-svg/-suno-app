<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI Music Auto Studio v17</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

textarea,select{
width:100%;
padding:10px;
margin-top:10px;
background:#0b1220;
border:1px solid #334155;
color:white;
border-radius:10px;
}

button{
padding:12px 18px;
border-radius:10px;
border:none;
margin-top:10px;
margin-right:5px;
cursor:pointer;
}

.primary{background:#2563eb;color:white;}
.green{background:#059669;color:white;}
.orange{background:#d97706;color:white;}
.purple{background:#7c3aed;color:white;}
.gray{background:#374151;color:white;}

.track{
background:#0b1220;
padding:15px;
margin-top:15px;
border-radius:12px;
}

.field{
margin-top:10px;
}

.field-title{
color:#93c5fd;
font-size:14px;
margin-bottom:5px;
}

.copyButtons button{
margin-top:6px;
}

</style>

</head>
<body>

<div class="container">

<h1>AI Music Auto Studio v17</h1>

<div class="card">

<h3>음성 / 텍스트 명령</h3>

<textarea id="commandInput" placeholder="예: 비 오는 날 듣기 좋은 노래 10곡 만들어줘"></textarea>

<button class="primary" onclick="startVoice()">🎤 음성 명령</button>
<button class="gray" onclick="analyzeCommand()">AI 분석</button>

</div>

<div class="card">

<h3>기본 설정</h3>

<label>곡 수</label>

<select id="trackCount">
<option>6</option>
<option>8</option>
<option selected>10</option>
<option>12</option>
<option>15</option>
<option>20</option>
</select>

<label>장르</label>

<select id="genre">
<option>korean ballad</option>
<option>korean pop</option>
<option>acoustic ballad</option>
<option>lofi chill</option>
</select>

<label>분위기</label>

<select id="mood">
<option>rainy mood</option>
<option>romantic mood</option>
<option>sad emotional</option>
<option>warm sentimental</option>
</select>

<label>보컬 타입</label>

<select id="vocal">
<option>female vocal</option>
<option>male vocal</option>
<option>duet vocal</option>
</select>

<label>가사 언어</label>

<select id="lyricsLang">
<option value="korean">한국어</option>
<option value="english">English</option>
<option value="japanese">日本語</option>
</select>

<br>

<button class="green" onclick="generateTracks()">곡 생성</button>
<button class="purple" onclick="copyNext()">Next Copy</button>
<button class="gray" onclick="resetCopy()">복사 초기화</button>
<button class="orange" onclick="openSuno()">🎵 Suno 열기</button>

<div id="copyStatus" style="margin-top:10px;"></div>

</div>

<div class="card">

<h3>Suno 붙여넣기용 결과</h3>

<div id="tracks"></div>

</div>

</div>

<script>

let tracks=[];
let copySteps=[];
let copyIndex=0;

function openSuno(){
window.open("https://suno.com/create");
}

function generateTitle(){

const titles=[
"Rainy Window",
"Midnight Rain",
"Lonely Rain",
"Rainy Memory",
"Falling Rain",
"Rainy Night Song",
"Silent Rain",
"Rainy Melody",
"Window of Rain",
"Rainy City Lights"
];

return titles[Math.floor(Math.random()*titles.length)];

}

function generateLyrics(){

const lang=document.getElementById("lyricsLang").value;

if(lang==="english"){
return `[Verse]
Rain falling on my window tonight
Memories slowly come alive

[Chorus]
In the rain I call your name
Whisper softly in the dark`;
}

if(lang==="japanese"){
return `[Verse]
雨の窓に寄り添って
静かに心が揺れる

[Chorus]
雨の夜に君を思う
この歌が届くように`;
}

return `[Verse]
비가 내리는 창가에 기대어
조용히 번지는 오늘의 마음

[Chorus]
비 오는 날에도 네가 떠오르면
이 노래가 천천히 너를 부를 거야`;

}

function generateTracks(){

tracks=[];
copySteps=[];
copyIndex=0;

const total=document.getElementById("trackCount").value;
const genre=document.getElementById("genre").value;
const mood=document.getElementById("mood").value;
const vocal=document.getElementById("vocal").value;

for(let i=1;i<=total;i++){

const title=generateTitle();

const style=`${genre}, ${vocal}, ${mood}, emotional melody`;

const lyrics=generateLyrics();

tracks.push({title,style,lyrics});

copySteps.push({text:title,label:`${i}번곡 Title`});
copySteps.push({text:style,label:`${i}번곡 Style`});
copySteps.push({text:lyrics,label:`${i}번곡 Lyrics`});

}

renderTracks();

updateCopyStatus();

}

function renderTracks(){

let html="";

tracks.forEach((t,i)=>{

html+=`

<div class="track">

<b>${i+1}번곡</b>

<div class="field">
<div class="field-title">Title</div>
${t.title}
</div>

<div class="field">
<div class="field-title">Style</div>
${t.style}
</div>

<div class="field">
<div class="field-title">Lyrics</div>
<pre>${t.lyrics}</pre>
</div>

<div class="copyButtons">

<button onclick="copyText('${t.title}')">Title 복사</button>
<button onclick="copyText('${t.style}')">Style 복사</button>
<button onclick="copyText(\`${t.lyrics}\`)">Lyrics 복사</button>

</div>

</div>

`;

});

document.getElementById("tracks").innerHTML=html;

}

function copyText(text){

navigator.clipboard.writeText(text);

}

function copyNext(){

if(copyIndex>=copySteps.length){
alert("모든 복사 완료");
return;
}

navigator.clipboard.writeText(copySteps[copyIndex].text);

copyIndex++;

updateCopyStatus();

}

function resetCopy(){

copyIndex=0;

updateCopyStatus();

}

function updateCopyStatus(){

if(copyIndex>=copySteps.length){

document.getElementById("copyStatus").innerText="복사 완료";

return;

}

document.getElementById("copyStatus").innerText=
"다음 복사: "+copySteps[copyIndex].label;

}

function analyzeCommand(){

const text=document.getElementById("commandInput").value;

if(text.includes("20")) document.getElementById("trackCount").value=20;
if(text.includes("15")) document.getElementById("trackCount").value=15;
if(text.includes("12")) document.getElementById("trackCount").value=12;

}

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

const rec=new SpeechRecognition();

rec.lang="ko-KR";

rec.start();

rec.onresult=function(e){

document.getElementById("commandInput").value=e.results[0][0].transcript;

};

}

</script>

</body>
</html>
