<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Music Auto Studio v28</title>
  <style>
    :root{
      --bg1:#f7f8ff;
      --bg2:#eef4ff;
      --card:#ffffff;
      --text:#344054;
      --sub:#667085;
      --line:#dbe3f0;
      --pri:#5b6cff;
      --pri2:#7c4dff;
      --ok:#17b26a;
      --warn:#f79009;
      --bad:#f04438;
      --soft:#eef2ff;
      --shadow:0 12px 30px rgba(52,64,84,.10);
      --radius:20px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,77,255,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(91,108,255,.10), transparent 26%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .wrap{max-width:1520px;margin:0 auto;padding:16px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      margin-bottom:16px;
    }
    .brand h1{margin:0;font-size:30px;font-weight:900;letter-spacing:-.5px}
    .brand p{margin:5px 0 0;color:var(--sub);font-size:14px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      background:#fff;border:1px solid var(--line);border-radius:999px;
      padding:10px 14px;box-shadow:var(--shadow);font-weight:800;font-size:14px;
    }
    .dot{width:10px;height:10px;border-radius:50%;background:#c5cad3}
    .dot.ok{background:var(--ok)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--bad)}

    .layout{
      display:grid;
      grid-template-columns: 390px minmax(0,1fr) 390px;
      gap:16px;
      align-items:start;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      min-width:0;
    }
    .card h2{
      margin:0 0 12px;
      font-size:18px;font-weight:900;
    }
    .card h3{
      margin:16px 0 10px;
      font-size:15px;font-weight:900;
    }
    .field{margin-bottom:10px}
    .label{
      display:block;margin-bottom:6px;
      font-size:13px;color:var(--sub);font-weight:800;
    }
    input[type="text"], input[type="number"], textarea, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
      font-size:14px;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    textarea{
      resize:vertical;min-height:92px;line-height:1.55;
    }
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

    .btns{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .btns.one{grid-template-columns:1fr}
    .btns.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    button{
      border:none;border-radius:14px;padding:11px 14px;
      font-size:14px;font-weight:900;cursor:pointer;transition:.18s ease;
      width:100%;
    }
    button:hover{transform:translateY(-1px)}
    .pri{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
    .soft{background:#eef2ff;color:#334155;border:1px solid #d9e2ff}
    .ok{background:linear-gradient(135deg,#17b26a,#12a150);color:#fff}
    .warn{background:linear-gradient(135deg,#ff9d2f,#f79009);color:#fff}
    .bad{background:linear-gradient(135deg,#f04438,#d92d20);color:#fff}
    .ghost{background:#f8fafc;color:#344054;border:1px solid var(--line)}
    .tiny{font-size:12px;color:var(--sub);line-height:1.55}

    .opt-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .check{
      display:flex;align-items:center;gap:8px;
      border:1px solid var(--line);
      background:#fbfcff;
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      font-weight:700;
      min-width:0;
    }
    .check input{margin:0;flex:0 0 auto}
    .check span{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:block;
    }

    .status-list{display:grid;gap:10px}
    .status-item{
      border:1px solid var(--line);border-radius:14px;padding:12px;
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      background:#fbfcff;
    }
    .status-item b{font-size:14px}
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900;
      background:#eef2f6;color:#425466;
      white-space:nowrap;
    }
    .badge.ok{background:#e9fff3;color:#067647}
    .badge.warn{background:#fff3df;color:#b54708}
    .badge.bad{background:#ffe9e7;color:#b42318}

    .quick{
      border:1px dashed #c7d2fe;border-radius:16px;padding:14px;background:#f8faff;
    }
    .preview{
      margin-top:10px;
      background:#fff;border:1px solid var(--line);border-radius:14px;
      padding:12px;min-height:150px;max-height:260px;overflow:auto;
      white-space:pre-wrap;line-height:1.55;font-size:14px;
    }

    .song-list{display:grid;gap:12px}
    .song{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
      min-width:0;
    }
    .song-head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
      padding:14px;
      background:linear-gradient(180deg,#f9fbff,#f3f6ff);
      border-bottom:1px solid var(--line);
    }
    .song-head-left{min-width:0;flex:1}
    .song-title{
      font-size:19px;font-weight:900;margin-bottom:6px;
      word-break:break-word;
    }
    .meta{display:flex;flex-wrap:wrap;gap:6px}
    .tag{
      display:inline-flex;align-items:center;
      padding:6px 10px;border-radius:999px;
      background:#eef2ff;color:#3949ab;font-size:12px;font-weight:900;
    }
    .song-actions{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      width:240px;
      flex:0 0 240px;
    }
    .song-body{padding:14px;display:grid;gap:12px}
    .box{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
      min-width:0;
    }
    .box b{display:block;margin-bottom:8px}
    .lyrics{white-space:pre-wrap;line-height:1.62;font-size:14px;word-break:break-word}

    .sticky{position:sticky;top:12px}

    @media (max-width: 1320px){
      .layout{grid-template-columns:360px minmax(0,1fr) 360px}
    }
    @media (max-width: 1180px){
      .layout{grid-template-columns:1fr}
      .sticky{position:static}
    }
    @media (max-width: 760px){
      .brand h1{font-size:24px}
      .row,.row3,.opt-grid,.btns,.btns.three{grid-template-columns:1fr}
      .song-head{flex-direction:column}
      .song-actions{width:100%;flex:1;grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>🎵 AI Music Auto Studio</h1>
        <p>정렬 개선 · 영어 가사 옵션 추가 · 장르/악기/보컬 선택 확장</p>
      </div>
      <div class="pill">
        <span class="dot warn" id="aiDot"></span>
        <span id="aiText">AI 상태 확인 전</span>
      </div>
    </div>

    <div class="layout">
      <!-- LEFT -->
      <div class="card">
        <h2>⚙️ 기본 설정</h2>

        <div class="field">
          <label class="label">서버 주소</label>
          <input type="text" id="apiBase" value="http://172.30.1.62:4000" placeholder="예: http://172.30.1.62:4000" />
        </div>

        <div class="field">
          <label class="label">AI 생성 경로</label>
          <input type="text" id="generatePath" value="/api/ai/generate-song-pack" placeholder="/api/ai/generate-song-pack" />
        </div>

        <div class="btns">
          <button class="pri" id="btnCheckAi">🔌 AI 연결 확인</button>
          <button class="soft" id="btnSaveServer">💾 서버 저장</button>
        </div>

        <h3>🎼 제작 조건</h3>

        <div class="field">
          <label class="label">주제 / 요청</label>
          <textarea id="themeInput" placeholder="예: 봄 향기 느낌이 물씬 풍기는 사랑 노래"></textarea>
        </div>

        <div class="row3">
          <div class="field">
            <label class="label">여자곡</label>
            <input type="number" id="femaleCount" min="0" max="20" value="3" />
          </div>
          <div class="field">
            <label class="label">남자곡</label>
            <input type="number" id="maleCount" min="0" max="20" value="3" />
          </div>
          <div class="field">
            <label class="label">듀엣곡</label>
            <input type="number" id="duetCount" min="0" max="20" value="4" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label class="label">분위기</label>
            <select id="moodInput">
              <option value="warm romantic spring">따뜻한 로맨틱</option>
              <option value="bright hopeful spring">밝고 희망적</option>
              <option value="dreamy emotional spring">몽환적 감성</option>
              <option value="fresh youthful spring">상큼하고 산뜻함</option>
              <option value="soft sentimental spring">부드러운 감성</option>
              <option value="epic emotional cinematic">웅장하고 시네마틱</option>
              <option value="cool urban stylish">세련되고 도시적</option>
            </select>
          </div>
          <div class="field">
            <label class="label">가사 언어</label>
            <select id="lyricsLang">
              <option value="ko">한국어</option>
              <option value="ko-mix">한국어 중심 + 영어 훅</option>
              <option value="en">영어</option>
            </select>
          </div>
        </div>

        <h3>🎹 장르 선택</h3>
        <div class="opt-grid" id="genreOptions">
          <label class="check"><input type="checkbox" value="K-pop" checked><span>K-pop</span></label>
          <label class="check"><input type="checkbox" value="Ballad"><span>Ballad</span></label>
          <label class="check"><input type="checkbox" value="Dance Pop"><span>Dance Pop</span></label>
          <label class="check"><input type="checkbox" value="Acoustic Pop"><span>Acoustic Pop</span></label>
          <label class="check"><input type="checkbox" value="R&B"><span>R&B</span></label>
          <label class="check"><input type="checkbox" value="Indie Pop"><span>Indie Pop</span></label>
          <label class="check"><input type="checkbox" value="Synth Pop"><span>Synth Pop</span></label>
          <label class="check"><input type="checkbox" value="Cinematic Pop"><span>Cinematic Pop</span></label>
          <label class="check"><input type="checkbox" value="Lo-fi Pop"><span>Lo-fi Pop</span></label>
          <label class="check"><input type="checkbox" value="Rock Ballad"><span>Rock Ballad</span></label>
          <label class="check"><input type="checkbox" value="City Pop"><span>City Pop</span></label>
          <label class="check"><input type="checkbox" value="EDM Pop"><span>EDM Pop</span></label>
        </div>

        <h3>🎸 악기 선택</h3>
        <div class="opt-grid" id="instrumentOptions">
          <label class="check"><input type="checkbox" value="piano" checked><span>Piano</span></label>
          <label class="check"><input type="checkbox" value="acoustic guitar" checked><span>Acoustic Guitar</span></label>
          <label class="check"><input type="checkbox" value="electric guitar"><span>Electric Guitar</span></label>
          <label class="check"><input type="checkbox" value="strings"><span>Strings</span></label>
          <label class="check"><input type="checkbox" value="synth pad"><span>Synth Pad</span></label>
          <label class="check"><input type="checkbox" value="bass"><span>Bass</span></label>
          <label class="check"><input type="checkbox" value="drums"><span>Drums</span></label>
          <label class="check"><input type="checkbox" value="violin"><span>Violin</span></label>
          <label class="check"><input type="checkbox" value="cello"><span>Cello</span></label>
          <label class="check"><input type="checkbox" value="flute"><span>Flute</span></label>
          <label class="check"><input type="checkbox" value="brass"><span>Brass</span></label>
          <label class="check"><input type="checkbox" value="ambient textures"><span>Ambient Textures</span></label>
        </div>

        <h3>🎤 보컬 스타일</h3>
        <div class="opt-grid" id="vocalOptions">
          <label class="check"><input type="checkbox" value="soft vocal" checked><span>Soft Vocal</span></label>
          <label class="check"><input type="checkbox" value="sweet vocal"><span>Sweet Vocal</span></label>
          <label class="check"><input type="checkbox" value="emotional vocal"><span>Emotional Vocal</span></label>
          <label class="check"><input type="checkbox" value="powerful vocal"><span>Powerful Vocal</span></label>
          <label class="check"><input type="checkbox" value="airy vocal"><span>Airy Vocal</span></label>
          <label class="check"><input type="checkbox" value="breathy vocal"><span>Breathy Vocal</span></label>
          <label class="check"><input type="checkbox" value="clear tone"><span>Clear Tone</span></label>
          <label class="check"><input type="checkbox" value="warm tone"><span>Warm Tone</span></label>
          <label class="check"><input type="checkbox" value="youthful tone"><span>Youthful Tone</span></label>
          <label class="check"><input type="checkbox" value="duet harmony"><span>Duet Harmony</span></label>
        </div>

        <div style="height:12px"></div>
        <div class="btns">
          <button class="ok" id="btnGenerate">✨ 곡 세트 생성</button>
          <button class="soft" id="btnClearSongs">🧹 결과 초기화</button>
        </div>

        <h3>🎬 작업 메뉴</h3>
        <div class="btns">
          <button class="warn" id="btnOpenSunoLeft">🎵 수노 열기</button>
          <button class="soft" id="btnSongMake">🎼 노래 제작</button>
          <button class="soft" id="btnSongEdit">✂️ 노래 편집 시작</button>
          <button class="soft" id="btnVideoMake">🎥 영상 만들기</button>
          <button class="soft" id="btnOpenBlog">📝 블로그 도구</button>
          <button class="soft" id="btnCopyAllSongs">📦 전체 결과 복사</button>
        </div>
      </div>

      <!-- CENTER -->
      <div class="card">
        <h2>🎧 생성된 곡 관리</h2>
        <div class="tiny" id="songSummary">아직 생성된 곡이 없습니다.</div>
        <div style="height:10px"></div>
        <div class="btns">
          <button class="ghost" id="btnDeleteCurrentSong">🗑️ 현재 곡 삭제</button>
          <button class="bad" id="btnDeleteAllSongs">🧨 전체 곡 삭제</button>
        </div>
        <div style="height:12px"></div>
        <div class="song-list" id="songList"></div>
      </div>

      <!-- RIGHT -->
      <div class="sticky">
        <div class="card">
          <h2>📋 빠르게 붙여넣기</h2>
          <div class="quick">
            <div class="tiny">
              복사 순서: <b>1번 제목 → 1번 스타일 → 1번 가사 → 2번 제목 → 2번 스타일 → 2번 가사</b>
            </div>
            <div style="height:10px"></div>
            <div class="btns">
              <button class="pri" id="btnNextCopy">⏭️ 넥스트 카피</button>
              <button class="soft" id="btnResetCopy">🔄 복사 초기화</button>
              <button class="warn" id="btnOpenSuno">🎵 수노 열기</button>
              <button class="soft" id="btnCopyCurrentAll">📦 현재곡 전체복사</button>
            </div>
            <div style="height:10px"></div>
            <div class="tiny" id="copyProgress">복사 대기중</div>
            <div class="preview" id="copyPreview">복사할 내용이 여기에 표시됩니다.</div>
          </div>
        </div>

        <div class="card" style="margin-top:16px">
          <h2>🚦 작업 진행 상태</h2>
          <div class="status-list" id="statusList"></div>
        </div>

        <div class="card" style="margin-top:16px">
          <h2>🛠️ 수노 자동/수동 제어</h2>
          <div class="btns">
            <button class="soft" id="btnCopyTitle">🏷️ 현재 제목 복사</button>
            <button class="soft" id="btnCopyStyle">🎚️ 현재 스타일 복사</button>
            <button class="soft" id="btnCopyLyrics">📝 현재 가사 복사</button>
            <button class="soft" id="btnPrevSong">⬅️ 이전 곡</button>
            <button class="soft" id="btnNextSong">➡️ 다음 곡</button>
            <button class="soft" id="btnSelectFirstSong">1️⃣ 첫 곡 선택</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const el = {
      aiDot: $('aiDot'),
      aiText: $('aiText'),
      apiBase: $('apiBase'),
      generatePath: $('generatePath'),
      btnCheckAi: $('btnCheckAi'),
      btnSaveServer: $('btnSaveServer'),
      themeInput: $('themeInput'),
      femaleCount: $('femaleCount'),
      maleCount: $('maleCount'),
      duetCount: $('duetCount'),
      moodInput: $('moodInput'),
      lyricsLang: $('lyricsLang'),
      btnGenerate: $('btnGenerate'),
      btnClearSongs: $('btnClearSongs'),
      btnOpenSunoLeft: $('btnOpenSunoLeft'),
      btnSongMake: $('btnSongMake'),
      btnSongEdit: $('btnSongEdit'),
      btnVideoMake: $('btnVideoMake'),
      btnOpenBlog: $('btnOpenBlog'),
      btnCopyAllSongs: $('btnCopyAllSongs'),
      songSummary: $('songSummary'),
      songList: $('songList'),
      btnDeleteCurrentSong: $('btnDeleteCurrentSong'),
      btnDeleteAllSongs: $('btnDeleteAllSongs'),
      btnNextCopy: $('btnNextCopy'),
      btnResetCopy: $('btnResetCopy'),
      btnOpenSuno: $('btnOpenSuno'),
      btnCopyCurrentAll: $('btnCopyCurrentAll'),
      copyProgress: $('copyProgress'),
      copyPreview: $('copyPreview'),
      statusList: $('statusList'),
      btnCopyTitle: $('btnCopyTitle'),
      btnCopyStyle: $('btnCopyStyle'),
      btnCopyLyrics: $('btnCopyLyrics'),
      btnPrevSong: $('btnPrevSong'),
      btnNextSong: $('btnNextSong'),
      btnSelectFirstSong: $('btnSelectFirstSong')
    };

    const STORE = 'ai_music_auto_studio_v28_rich_options';

    let state = {
      songs: [],
      copyQueue: [],
      copyIndex: 0,
      currentSongIndex: 0,
      aiConnected: false,
      statuses: {
        aiConnection: '대기중',
        titleGenerate: '대기중',
        styleGenerate: '대기중',
        lyricsGenerate: '대기중',
        copyReady: '대기중',
        mp3Edit: '대기중',
        longVideo: '대기중'
      }
    };

    function saveApp() {
      const data = {
        apiBase: el.apiBase.value.trim(),
        generatePath: el.generatePath.value.trim(),
        themeInput: el.themeInput.value,
        femaleCount: el.femaleCount.value,
        maleCount: el.maleCount.value,
        duetCount: el.duetCount.value,
        moodInput: el.moodInput.value,
        lyricsLang: el.lyricsLang.value,
        songs: state.songs,
        copyIndex: state.copyIndex,
        currentSongIndex: state.currentSongIndex,
        aiConnected: state.aiConnected,
        statuses: state.statuses,
        genres: getCheckedValues('genreOptions'),
        instruments: getCheckedValues('instrumentOptions'),
        vocals: getCheckedValues('vocalOptions')
      };
      localStorage.setItem(STORE, JSON.stringify(data));
    }

    function applyChecks(containerId, values) {
      const root = document.getElementById(containerId);
      if (!root || !Array.isArray(values)) return;
      root.querySelectorAll('input[type="checkbox"]').forEach(chk => {
        chk.checked = values.includes(chk.value);
      });
    }

    function loadApp() {
      try {
        const raw = localStorage.getItem(STORE);
        if (!raw) return;
        const data = JSON.parse(raw);
        el.apiBase.value = data.apiBase || el.apiBase.value;
        el.generatePath.value = data.generatePath || el.generatePath.value;
        el.themeInput.value = data.themeInput || '';
        el.femaleCount.value = data.femaleCount || 3;
        el.maleCount.value = data.maleCount || 3;
        el.duetCount.value = data.duetCount || 4;
        el.moodInput.value = data.moodInput || el.moodInput.value;
        el.lyricsLang.value = data.lyricsLang || el.lyricsLang.value;
        state.songs = Array.isArray(data.songs) ? data.songs : [];
        state.copyIndex = Number.isFinite(data.copyIndex) ? data.copyIndex : 0;
        state.currentSongIndex = Number.isFinite(data.currentSongIndex) ? data.currentSongIndex : 0;
        state.aiConnected = !!data.aiConnected;
        state.statuses = data.statuses || state.statuses;
        applyChecks('genreOptions', data.genres || ['K-pop']);
        applyChecks('instrumentOptions', data.instruments || ['piano', 'acoustic guitar']);
        applyChecks('vocalOptions', data.vocals || ['soft vocal']);
      } catch (e) {
        console.warn(e);
      }
    }

    function setAiStatus(type, text) {
      el.aiDot.className = 'dot ' + (type === 'ok' ? 'ok' : type === 'bad' ? 'bad' : 'warn');
      el.aiText.textContent = text;
    }

    function setStatus(key, value) {
      state.statuses[key] = value;
      renderStatuses();
      saveApp();
    }

    function badgeClass(v) {
      if (v === '완료') return 'badge ok';
      if (v === '실패') return 'badge bad';
      return 'badge warn';
    }

    function renderStatuses() {
      const items = [
        ['aiConnection','AI 연결'],
        ['titleGenerate','제목 생성'],
        ['styleGenerate','스타일 생성'],
        ['lyricsGenerate','가사 생성'],

        ['mp3Edit','mp3 편집'],

      ];
      el.statusList.innerHTML = items.map(([k, name]) => `

    function normalizeBase(url) {
      return (url || '').trim().replace(/\/+$/, '');
    }

    function normalizePath(path) {
      const p = (path || '').trim();
      if (!p) return '/api/ai/generate-song-pack';
      return p.startsWith('/') ? p : '/' + p;
    }

    function escapeHtml(str='') {
      return str.replace(/[&<>"']/g, s => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
      }[s]));
    }

    function getCheckedValues(containerId) {
      return Array.from(document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`))
        .map(el => el.value);
    }

    async function checkAi() {
      const base = normalizeBase(el.apiBase.value);
      if (!base) {
        alert('서버 주소를 입력해 주세요.');
        return false;
      }
      setAiStatus('warn', 'AI 연결 확인 중...');
      try {
        const res = await fetch(base + '/api/health');
        if (!res.ok) throw new Error('health fail');
        const data = await res.json();
        state.aiConnected = !!data.ok;
        if (state.aiConnected) {
          setAiStatus('ok', 'AI 연결됨');
          setStatus('aiConnection','완료');
        } else {
          setAiStatus('bad', 'AI 연결 실패');
          setStatus('aiConnection','실패');
        }
        saveApp();
        return state.aiConnected;
      } catch (e) {
        state.aiConnected = false;
        setAiStatus('bad', 'AI 연결 실패');
        setStatus('aiConnection','실패');
        return false;
      }
    }

    function sanitizeTheme(text) {
      const t = (text || '').trim();
      if (!t) return '봄 향기 느낌이 물씬 풍기는 사랑 노래';
      return t
        .replace(/여자\s*\d+곡/gi, '')
        .replace(/남자\s*\d+곡/gi, '')
        .replace(/듀엣\s*\d+곡/gi, '')
        .replace(/만들어줘|만들어죠|만들어 줘|제작해줘|제작해 줘/gi, '')
        .replace(/\s{2,}/g, ' ')
        .trim() || '봄 향기 느낌이 물씬 풍기는 사랑 노래';
    }

    function typeKo(type) {
      if (type === 'female') return '여자 솔로';
      if (type === 'male') return '남자 솔로';
      return '듀엣';
    }

    function buildPlan() {
      const female = Math.max(0, parseInt(el.femaleCount.value || 0, 10));
      const male = Math.max(0, parseInt(el.maleCount.value || 0, 10));
      const duet = Math.max(0, parseInt(el.duetCount.value || 0, 10));
      const plan = [];
      for (let i=1;i<=female;i++) plan.push({type:'female',index:i});
      for (let i=1;i<=male;i++) plan.push({type:'male',index:i});
      for (let i=1;i<=duet;i++) plan.push({type:'duet',index:i});
      return plan;
    }

        '벚꽃이 멈춘 자리','분홍빛 마음의 결','향기 따라 걷는 계절','조용히 피는 떨림'
      ];
      const tMale = [
        '봄밤을 건너는 마음','따뜻한 바람 끝에서','네가 머문 햇살','꽃그늘 아래 약속',
        '봄길에 남은 온기','한낮의 미소를 닮아','오늘도 너를 부르면','계절 끝의 설렘'

    function makeStyle(type, mood, index, genres, instruments, vocals) {
      const baseGenre = genres.length ? genres.join(', ') : 'K-pop';
      const baseInst = instruments.length ? instruments.join(', ') : 'piano, acoustic guitar';
      const baseVocal = vocals.length ? vocals.join(', ') : 'soft vocal';

      const typeHint = type === 'female'
        ? 'female vocal'
        : type === 'male'
        ? 'male vocal'
        : 'duet';

      const seeds = {
        female: ['dreamy', 'warm', 'airy', 'sweet', 'bright'],
        male: ['emotional', 'warm', 'clean', 'smooth', 'heartfelt'],
        duet: ['romantic', 'cinematic', 'lush', 'harmonic', 'melodic']
      };

      const words = seeds[type];
      const flavor = [words[(index-1)%words.length], words[index%words.length]].join(', ');
      return `${baseGenre}, ${typeHint}, ${baseVocal}, ${baseInst}, ${mood}, ${flavor}`;

    function buildFallbackSongs() {
      const theme = sanitizeTheme(el.themeInput.value);
      const mood = el.moodInput.value;
      const langMode = el.lyricsLang.value;
      const plan = buildPlan();
      const genres = getCheckedValues('genreOptions');
      const instruments = getCheckedValues('instrumentOptions');
      const vocals = getCheckedValues('vocalOptions');

      return plan.map(item => {
        const title = makeTitle(theme, item.type, item.index);
        const style = makeStyle(item.type, mood, item.index, genres, instruments, vocals);
        const lyrics = makeLyrics({
          title,
          type: item.type,
          index: item.index,
          langMode
        });
        return { type:item.type, title, style, lyrics };
      });
    }

    function buildCopyQueue(songs) {
      return songs.flatMap((song, i) => [
        { songIndex:i, kind:'title', text:song.title, preview:`${i+1}번 제목\n${song.title}` },
        { songIndex:i, kind:'style', text:song.style, preview:`${i+1}번 스타일\n${song.style}` },
        { songIndex:i, kind:'lyrics', text:song.lyrics, preview:`${i+1}번 가사\n${song.lyrics}` }
      ]);
    }

    function refreshCopyQueue() {
      state.copyQueue = buildCopyQueue(state.songs);
      if (state.copyIndex >= state.copyQueue.length) state.copyIndex = 0;
      renderCopyPreview();
    }

    function renderCopyPreview() {
      if (!state.copyQueue.length) {
        el.copyProgress.textContent = '복사 대기중';
        el.copyPreview.textContent = '복사할 내용이 여기에 표시됩니다.';
        setStatus('copyReady','대기중');
        return;
      }
      if (state.copyIndex >= state.copyQueue.length) {
        el.copyProgress.textContent = `복사 완료 (${state.copyQueue.length}/${state.copyQueue.length})`;
        el.copyPreview.textContent = '모든 복사가 끝났습니다. 복사 초기화를 눌러 다시 시작하세요.';
        setStatus('copyReady','완료');
        return;
      }
      const item = state.copyQueue[state.copyIndex];
      state.currentSongIndex = item.songIndex;
      el.copyProgress.textContent = `다음 복사: ${state.copyIndex + 1} / ${state.copyQueue.length}`;
      el.copyPreview.textContent = item.preview;
      setStatus('copyReady','완료');
    }

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
    }

    async function nextCopy() {
      if (!state.copyQueue.length) {
        alert('먼저 곡을 생성해 주세요.');
        return;
      }
      if (state.copyIndex >= state.copyQueue.length) {
        alert('모든 복사가 끝났습니다. 복사 초기화를 눌러 주세요.');
        renderCopyPreview();
        return;
      }
      const item = state.copyQueue[state.copyIndex];
      try {
        await copyText(item.text);
        state.currentSongIndex = item.songIndex;
        state.copyIndex += 1;
        renderCopyPreview();
        saveApp();
        renderSongs();
      } catch (e) {
        alert('복사 실패');
      }
    }

    function resetCopy() {
      state.copyIndex = 0;
      refreshCopyQueue();
      saveApp();
    }

    function renderSongs() {
      if (!state.songs.length) {
        el.songSummary.textContent = '아직 생성된 곡이 없습니다.';
        el.songList.innerHTML = '';
        refreshCopyQueue();
        return;
      }

      const female = state.songs.filter(s => s.type === 'female').length;
      const male = state.songs.filter(s => s.type === 'male').length;
      const duet = state.songs.filter(s => s.type === 'duet').length;

      el.songSummary.textContent = `총 ${state.songs.length}곡 생성됨 · 여자 ${female}곡 · 남자 ${male}곡 · 듀엣 ${duet}곡`;

      el.songList.innerHTML = state.songs.map((song, i) => `
        <div class="song">
          <div class="song-head">
            <div class="song-head-left">
              <div class="song-title">${i + 1}. ${escapeHtml(song.title)}</div>
              <div class="meta">
                <span class="tag">${escapeHtml(typeKo(song.type))}</span>
                <span class="tag">Style EN</span>
                ${state.currentSongIndex === i ? '<span class="tag">현재 선택</span>' : ''}
              </div>
            </div>
            <div class="song-actions">
              <button class="soft" onclick="appCopySong(${i},'title')">제목 복사</button>
              <button class="soft" onclick="appCopySong(${i},'style')">스타일 복사</button>
              <button class="soft" onclick="appCopySong(${i},'lyrics')">가사 복사</button>
              <button class="ghost" onclick="appSelectSong(${i})">현재곡 선택</button>
              <button class="bad" onclick="appDeleteSong(${i})">삭제</button>
            </div>
          </div>
          <div class="song-body">
            <div class="box">
              <b>🎚️ 스타일</b>
              <div>${escapeHtml(song.style)}</div>
            </div>
            <div class="box">
              <b>📝 가사</b>
              <div class="lyrics">${escapeHtml(song.lyrics)}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    window.appCopySong = async function(index, part) {
      const song = state.songs[index];
      if (!song) return;
      try {
        await copyText(song[part]);
        state.currentSongIndex = index;
        saveApp();
        renderSongs();
      } catch (e) {
        alert('복사 실패');
      }
    };

    window.appSelectSong = function(index) {
      if (!state.songs[index]) return;
      state.currentSongIndex = index;
      saveApp();
      renderSongs();
    };

    window.appDeleteSong = function(index) {
      if (!state.songs[index]) return;
      state.songs.splice(index, 1);
      if (state.currentSongIndex >= state.songs.length) {
        state.currentSongIndex = Math.max(0, state.songs.length - 1);
      }
      state.copyIndex = 0;
      renderSongs();
      saveApp();
    };

    async function generateSongs() {
      const theme = sanitizeTheme(el.themeInput.value);
      const mood = el.moodInput.value;
      const langMode = el.lyricsLang.value;
      const plan = buildPlan();
      const genres = getCheckedValues('genreOptions');
      const instruments = getCheckedValues('instrumentOptions');
      const vocals = getCheckedValues('vocalOptions');

      if (!theme) {
        alert('주제를 입력해 주세요.');
        return;
      }
      if (!plan.length) {
        alert('최소 1곡 이상 선택해 주세요.');
        return;
      }

      setStatus('titleGenerate','대기중');
      setStatus('styleGenerate','대기중');
      setStatus('lyricsGenerate','대기중');
      setStatus('copyReady','대기중');

      const base = normalizeBase(el.apiBase.value);
      const path = normalizePath(el.generatePath.value);

      const payload = {
        instruction: theme,
        mood,
        language: langMode,
        plan,
        genres,
        instruments,
        vocals,
        rules: {
          unique_per_song: true,
          style_english_only: true,
          do_not_put_instruction_into_lyrics: true,
          output_format: 'json'
        }
      };

      try {
        const ok = await checkAi();
        if (!ok) throw new Error('AI not connected');

        const res = await fetch(base + path, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('generate failed');
        const data = await res.json();
        const songs = Array.isArray(data?.songs) ? data.songs : [];
        if (!songs.length) throw new Error('empty songs');

        state.songs = songs.map((song, idx) => ({
          type: song.type || plan[idx]?.type || 'female',
          title: String(song.title || makeTitle(theme, plan[idx]?.type || 'female', plan[idx]?.index || 1)).trim(),
          style: String(song.style || makeStyle(plan[idx]?.type || 'female', mood, plan[idx]?.index || 1, genres, instruments, vocals)).trim(),
          lyrics: String(song.lyrics || makeLyrics({
            title: song.title || makeTitle(theme, plan[idx]?.type || 'female', plan[idx]?.index || 1),
            type: plan[idx]?.type || 'female',
            index: plan[idx]?.index || 1,
            langMode
          })).trim()
        }));
      } catch (e) {
        state.songs = buildFallbackSongs();
      }

      setStatus('titleGenerate','완료');
      setStatus('styleGenerate','완료');
      setStatus('lyricsGenerate','완료');

      state.copyIndex = 0;
      state.currentSongIndex = 0;
      renderSongs();
      refreshCopyQueue();
      saveApp();
    }

    function clearSongs() {
      state.songs = [];
      state.copyQueue = [];
      state.copyIndex = 0;
      state.currentSongIndex = 0;
      setStatus('titleGenerate','대기중');
      setStatus('styleGenerate','대기중');
      setStatus('lyricsGenerate','대기중');
      setStatus('copyReady','대기중');
      renderSongs();
      saveApp();
    }

    function deleteCurrentSong() {
      if (!state.songs.length) return;
      state.songs.splice(state.currentSongIndex, 1);
      if (state.currentSongIndex >= state.songs.length) {
        state.currentSongIndex = Math.max(0, state.songs.length - 1);
      }
      state.copyIndex = 0;
      renderSongs();
      saveApp();
    }

    function deleteAllSongs() {
      if (!state.songs.length) return;
      if (!confirm('전체 곡을 삭제할까요?')) return;
      clearSongs();
    }

    function currentSong() {
      return state.songs[state.currentSongIndex] || null;
    }

      }
      const pack = `[제목]
${song.title}

[스타일]
${song.style}

[가사]
${song.lyrics}`;
      try {
        await copyText(pack);
      } catch (e) {
        alert('복사 실패');
      }
    }

    async function copyAllSongs() {
      if (!state.songs.length) {
        alert('복사할 곡이 없습니다.');
        return;
      }
      const text = state.songs.map((song, i) => `[${i+1}번 곡]
제목: ${song.title}
스타일: ${song.style}
가사:
${song.lyrics}`).join('\n\n----------------------\n\n');
      try {
        await copyText(text);
      } catch (e) {
        alert('전체 복사 실패');
      }
    }

    function prevSong() {
      if (!state.songs.length) return;
      state.currentSongIndex = Math.max(0, state.currentSongIndex - 1);
      saveApp();
      renderSongs();
    }

    function nextSongSelect() {
      if (!state.songs.length) return;
      state.currentSongIndex = Math.min(state.songs.length - 1, state.currentSongIndex + 1);
      saveApp();
      renderSongs();
    }

    function selectFirstSong() {
      if (!state.songs.length) return;
      state.currentSongIndex = 0;
      saveApp();
      renderSongs();
    }

    function bindOptionAutosave(containerId) {
      const root = document.getElementById(containerId);
      root.querySelectorAll('input[type="checkbox"]').forEach(chk => {
        chk.addEventListener('change', saveApp);
      });
    }

    function initDefaults() {
      if (!el.themeInput.value.trim()) {
        el.themeInput.value = '봄 향기 느낌이 물씬 풍기는 사랑 노래';
      }
      renderStatuses();
      renderSongs();
      renderCopyPreview();
      if (state.aiConnected) setAiStatus('ok','AI 연결됨');
      else setAiStatus('warn','AI 상태 확인 전');
    }

    el.btnCheckAi.addEventListener('click', checkAi);
    el.btnSaveServer.addEventListener('click', () => {
      saveApp();
      alert('서버 주소 저장 완료');
    });
    el.btnGenerate.addEventListener('click', generateSongs);
    el.btnClearSongs.addEventListener('click', clearSongs);
    el.btnDeleteCurrentSong.addEventListener('click', deleteCurrentSong);
    el.btnDeleteAllSongs.addEventListener('click', deleteAllSongs);

    el.btnNextCopy.addEventListener('click', nextCopy);
    el.btnResetCopy.addEventListener('click', resetCopy);
    el.btnOpenSuno.addEventListener('click', () => window.open('https://suno.com/create','_blank'));
    el.btnOpenSunoLeft.addEventListener('click', () => window.open('https://suno.com/create','_blank'));
    el.btnCopyCurrentAll.addEventListener('click', copyCurrentAll);

    el.btnCopyTitle.addEventListener('click', () => copyCurrentPart('title'));
    el.btnCopyStyle.addEventListener('click', () => copyCurrentPart('style'));
    el.btnCopyLyrics.addEventListener('click', () => copyCurrentPart('lyrics'));
    el.btnPrevSong.addEventListener('click', prevSong);
    el.btnNextSong.addEventListener('click', nextSongSelect);
    el.btnSelectFirstSong.addEventListener('click', selectFirstSong);

    el.btnSongMake.addEventListener('click', () => alert('노래 제작 작업 버튼입니다.'));
    el.btnSongEdit.addEventListener('click', () => {
      setStatus('mp3Edit','대기중');
      alert('노래 편집 시작 버튼입니다.');
    });
    el.btnVideoMake.addEventListener('click', () => {
      setStatus('longVideo','대기중');
      alert('영상 만들기 버튼입니다.');
    });
    el.btnOpenBlog.addEventListener('click', () => alert('블로그 도구 버튼입니다.'));
    el.btnCopyAllSongs.addEventListener('click', copyAllSongs);

    [
      el.apiBase, el.generatePath, el.themeInput, el.femaleCount, el.maleCount,
      el.duetCount, el.moodInput, el.lyricsLang
    ].forEach(node => node.addEventListener('change', saveApp));

    bindOptionAutosave('genreOptions');
    bindOptionAutosave('instrumentOptions');
    bindOptionAutosave('vocalOptions');

    loadApp();
    initDefaults();
  </script>
</body>
</html>
