<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Music Auto Studio v23</title>
  <style>
    :root{
      --bg1:#f8f5ff;
      --bg2:#eef5ff;
      --card:#ffffffd8;
      --line:#e8eaf4;
      --text:#4a4f68;
      --title:#5a5fcf;
      --pink:#f6b2e1;
      --pink2:#ffd7ec;
      --blue:#7ab8ff;
      --mint:#79dfd1;
      --green:#35a853;
      --red:#d84b5b;
      --shadow:0 10px 30px rgba(114,132,181,.12);
      --radius:22px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left,#ffe8f4 0%,transparent 32%),
        radial-gradient(circle at top right,#f9dff2 0%,transparent 30%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100vh;
      padding:18px;
    }

    .app{
      max-width:1460px;
      margin:0 auto;
    }

    .hero{
      background:rgba(255,255,255,.72);
      border:1px solid rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:20px;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      gap:16px;
      align-items:flex-start;
      min-width:320px;
      flex:1 1 560px;
    }

    .brand-icon{
      width:62px;
      height:62px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#ffd5eb,#dff3ff);
      font-size:30px;
      box-shadow:var(--shadow);
      flex-shrink:0;
    }

    h1{
      margin:0;
      color:var(--title);
      font-size:28px;
      line-height:1.2;
    }

    .subtitle{
      margin-top:8px;
      font-size:14px;
      color:#6d728a;
    }

    .hero-right{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:10px;
      min-width:320px;
      flex:0 1 420px;
    }

    .flow-badge{
      background:linear-gradient(90deg,#ffe6f1,#f7dff8);
      color:#8a6b8d;
      padding:10px 16px;
      border-radius:999px;
      font-size:13px;
      white-space:nowrap;
      box-shadow:var(--shadow);
    }

    .ai-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:12px 16px;
      border-radius:16px;
      background:#fffefb;
      border:1px solid #edf0f8;
      box-shadow:var(--shadow);
      font-weight:700;
      min-width:170px;
      justify-content:center;
    }

    .ai-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:#b8bcc8;
      box-shadow:0 0 0 4px rgba(184,188,200,.15);
    }

    .ai-badge.online{color:var(--green)}
    .ai-badge.online .ai-dot{
      background:var(--green);
      box-shadow:0 0 0 4px rgba(53,168,83,.12);
    }

    .ai-badge.offline{color:var(--red)}
    .ai-badge.offline .ai-dot{
      background:var(--red);
      box-shadow:0 0 0 4px rgba(216,75,91,.12);
    }

    .server-tools{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:8px;
      width:100%;
    }

    .mini-btn,.tab-btn,.action-btn,.soft-btn,.danger-btn,.primary-btn,.tiny-btn{
      border:none;
      cursor:pointer;
      transition:.18s ease;
      font-weight:700;
      border-radius:14px;
    }

    .mini-btn{
      padding:12px 14px;
      background:#fff;
      color:#5f6580;
      border:1px solid #edf0f7;
      box-shadow:var(--shadow);
      font-size:14px;
    }

    .mini-btn:hover,.tab-btn:hover,.action-btn:hover,.soft-btn:hover,.danger-btn:hover,.primary-btn:hover,.tiny-btn:hover{
      transform:translateY(-1px);
    }

    .compact-status{
      width:100%;
      max-width:380px;
      background:#f9fbff;
      border:1px solid #ebeff8;
      color:#67708c;
      border-radius:14px;
      padding:10px 12px;
      font-size:13px;
      text-align:right;
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .tabs{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .tab-btn{
      padding:14px 18px;
      background:#fff;
      border:1px solid #eef1f7;
      color:#6b7090;
      box-shadow:var(--shadow);
      font-size:15px;
    }

    .tab-btn.active{
      background:linear-gradient(135deg,#f6b2e1,#c899ff);
      color:#fff;
    }

    .tab-btn.blog{
      background:linear-gradient(135deg,#e8f3ff,#dff8f4);
      color:#4670c7;
    }

    .blog-panel{
      margin-top:14px;
      display:none;
      background:rgba(255,255,255,.85);
      border:1px solid #edf0f7;
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .blog-panel.show{display:block}

    .panel-title{
      font-size:18px;
      font-weight:800;
      color:#5570c5;
    }

    .panel-desc{
      margin-top:6px;
      font-size:14px;
      color:#6c728b;
    }

    .blog-actions,.toolbar,.quick-actions{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .action-btn,.soft-btn{
      padding:12px 16px;
      background:#eef4ff;
      color:#4d63b7;
      border:1px solid #dfe8fb;
    }

    .action-btn.primary,.primary-btn{
      padding:12px 18px;
      background:linear-gradient(135deg,#86c5ff,#79dfd1);
      color:#fff;
      border:1px solid transparent;
    }

    .danger-btn{
      padding:12px 16px;
      background:#fff1f4;
      color:#cb5164;
      border:1px solid #ffd9e0;
    }

    .page-grid{
      margin-top:18px;
      display:grid;
      grid-template-columns: 1.45fr 1fr;
      gap:18px;
      align-items:start;
    }

    .card{
      background:rgba(255,255,255,.80);
      border:1px solid rgba(255,255,255,.92);
      backdrop-filter:blur(8px);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .card h2{
      margin:0 0 16px;
      color:#5a5f84;
      font-size:20px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      font-weight:700;
      color:#666c88;
    }

    textarea,input,select{
      width:100%;
      border:1px solid #e4e8f2;
      border-radius:16px;
      background:#fff;
      color:#535975;
      padding:14px 14px;
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .triple{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
    }

    .chip-status{
      display:inline-flex;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      background:#f8fbff;
      border:1px solid #e6ecf7;
      color:#69718d;
      font-size:14px;
      min-height:42px;
    }

    .section-box{
      margin-top:14px;
      padding:14px;
      border:1px solid #ebeff6;
      border-radius:20px;
      background:rgba(250,252,255,.90);
    }

    .section-title{
      font-size:17px;
      font-weight:800;
      color:#6980c1;
      margin-bottom:12px;
    }

    .quick-copy-wrap{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:12px;
      align-items:start;
    }

    .copy-box{
      min-height:150px;
      background:#fff;
      border:1px solid #e8edf8;
      border-radius:18px;
      padding:12px;
      color:#5d6687;
      font-size:14px;
      line-height:1.7;
      white-space:pre-line;
    }

    .copy-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .copy-item{
      background:#fff;
      border:1px solid #edf1f8;
      border-radius:14px;
      padding:10px 12px;
      font-size:14px;
      color:#647090;
    }

    .progress-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .progress-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid #edf1f8;
      border-radius:18px;
      padding:14px;
    }

    .progress-name{
      font-size:15px;
      color:#59607d;
      font-weight:700;
    }

    .badge-wait{
      background:#f8fbff;
      border:1px solid #e8edf7;
      color:#7d88a3;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      white-space:nowrap;
    }

    .meter-label{
      margin:14px 0 6px;
      font-size:14px;
      font-weight:700;
      color:#67708c;
    }

    .meter{
      width:100%;
      height:12px;
      border-radius:999px;
      background:#eff3fa;
      overflow:hidden;
      border:1px solid #e7ebf5;
    }

    .meter-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#79c2ff,#f3a7d8,#7fe2cb);
      transition:width .3s ease;
    }

    .checklist label{
      display:flex;
      align-items:center;
      gap:10px;
      padding:7px 0;
      font-weight:600;
      color:#5e6684;
    }

    .log-box{
      margin-top:12px;
      min-height:120px;
      background:#fff;
      border:1px solid #edf1f8;
      border-radius:18px;
      padding:12px;
      font-size:14px;
      color:#6b7391;
      line-height:1.6;
      white-space:pre-line;
    }

    .song-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }

    .song-item{
      display:grid;
      grid-template-columns:32px 1fr auto;
      align-items:center;
      gap:12px;
      background:#fff;
      border:1px solid #edf1f8;
      border-radius:18px;
      padding:12px 14px;
    }

    .song-main{min-width:0}

    .song-title{
      font-weight:800;
      color:#555d82;
      font-size:15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .song-meta{
      font-size:13px;
      color:#838aa3;
      margin-top:4px;
    }

    .song-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .tiny-btn{
      padding:8px 12px;
      background:#eef4ff;
      color:#5b6fbb;
    }

    .tiny-btn.delete{
      background:#fff1f4;
      color:#ca5767;
    }

    .empty-box{
      border:1px dashed #dfe5f0;
      border-radius:18px;
      padding:18px;
      text-align:center;
      color:#8a91aa;
      background:#fcfdff;
    }

    @media (max-width:1100px){
      .page-grid{grid-template-columns:1fr}
      .hero-right{align-items:flex-start}
      .server-tools,.compact-status{justify-content:flex-start;text-align:left}
      .quick-copy-wrap{grid-template-columns:1fr}
    }

    @media (max-width:720px){
      body{padding:10px}
      h1{font-size:23px}
      .row,.triple{grid-template-columns:1fr}
      .hero{padding:14px}
      .card{padding:14px}
      .song-item{grid-template-columns:28px 1fr}
      .song-right{grid-column:1 / -1;justify-content:flex-start}
      .compact-status{max-width:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="brand-icon">🎀</div>
          <div>
            <h1>AI Music Auto Studio v23</h1>
            <div class="subtitle">음악 제작 · 블로그 초안 · 빠른 복사 · 곡 삭제 · 진행 상태를 한 화면에서 관리</div>
          </div>
        </div>

        <div class="hero-right">
          <div class="flow-badge">실행 → 노래 제작 → Suno 제작 → mp3 저장 → 노래 편집 시작</div>

          <div class="ai-badge offline" id="aiStatusBadge">
            <span class="ai-dot"></span>
            <span id="aiStatusText">AI OFFLINE</span>
          </div>

          <div class="server-tools">
            <button class="mini-btn" id="checkServerBtn">서버 상태 확인</button>
            <button class="mini-btn" id="downloadTestBtn">다운로드 테스트</button>
            <button class="mini-btn" id="mobileCheckBtn">모바일 연결 확인</button>
          </div>

          <div class="server-tools">
            <button class="mini-btn" id="githubCleanBtn">GitHub: 파일 한 번에 지우기</button>
          </div>

          <div class="compact-status" id="topMiniStatus">준비됨</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active">음악 제작</button>
        <button class="tab-btn">동화 제작</button>
        <button class="tab-btn">소설 제작</button>
        <button class="tab-btn">영상 관리</button>
        <button class="tab-btn">업로드 관리</button>
        <button class="tab-btn blog" id="openBlogPanelBtn">블로그 제작</button>
      </div>

      <div class="blog-panel" id="blogPanel">
        <div class="panel-title">블로그 제작</div>
        <div class="panel-desc">AI 연결 후 블로그 초안만 간단 생성합니다.</div>
        <div class="blog-actions">
          <button class="action-btn" id="connectBlogAiBtn">블로그 AI 연결</button>
          <button class="action-btn primary" id="makeBlogDraftBtn">블로그 초안 제작</button>
        </div>
        <div class="compact-status" id="blogMiniStatus" style="margin-top:12px;max-width:none;justify-content:flex-start;text-align:left;">대기중</div>
      </div>
    </section>

    <section class="page-grid">
      <div class="card">
        <h2>프로젝트 설정</h2>

        <label class="label" for="promptInput">음성 또는 텍스트 지시</label>
        <textarea id="promptInput" placeholder="예: 비 오는 날 듣기 좋은 발라드 여성보컬 10곡 만들어줘&#10;예: 중간에 랩이 들어가는 힙합 8곡 만들어줘&#10;예: 1번곡 조금 더 경쾌하게 만들어줘"></textarea>

        <div class="toolbar">
          <button class="soft-btn" id="voiceBtn">음성</button>
          <button class="primary-btn" id="runBtn">실행</button>
          <button class="soft-btn" id="helpBtn">설명</button>
          <span class="chip-status" id="mainStatusChip">상태: 대기중</span>
        </div>

        <div class="section-box">
          <div class="section-title">빠르게 붙여넣기 복사창</div>

          <div class="quick-copy-wrap">
            <div>
              <label class="label" for="quickCopyArea">복사용 문구</label>
              <div class="copy-box" id="quickCopyArea">여기에 제목, 설명, 태그, 가사요약 같은 복사용 문구가 순서대로 표시됩니다.</div>

              <div class="quick-actions">
                <button class="soft-btn" id="nextCopyBtn">넥스트카피</button>
                <button class="danger-btn" id="resetCopyBtn">복사초기화</button>
                <button class="soft-btn" id="copyNowBtn">지금복사</button>
              </div>
            </div>

            <div>
              <label class="label">복사 대기 목록</label>
              <div class="copy-list" id="copyQueueList"></div>
            </div>
          </div>

          <div class="quick-actions">
            <button class="soft-btn" id="openSunoBtn">수노열기</button>
            <button class="primary-btn" id="makeSongBtn">노래제작</button>
            <button class="soft-btn" id="startEditBtn">노래편집시작</button>
            <button class="soft-btn" id="makeVideoBtn">영상만들기</button>
          </div>
        </div>

        <div class="section-box">
          <div class="section-title">프로젝트 저장 / 불러오기</div>
          <div class="row">
            <div>
              <label class="label" for="projectName">프로젝트 이름</label>
              <input id="projectName" type="text" placeholder="예: 비오는날_발라드_10곡" />
            </div>
            <div>
              <label class="label" for="projectSelect">저장된 프로젝트</label>
              <select id="projectSelect">
                <option>저장된 프로젝트 없음</option>
              </select>
            </div>
          </div>
          <div class="toolbar" style="margin-bottom:0;">
            <button class="soft-btn" id="saveProjectBtn">저장</
